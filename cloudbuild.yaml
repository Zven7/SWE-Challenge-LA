steps:
  # -------------------------
  # Install dependencies + run tests
  # -------------------------
  - name: "python:3.12"
    entrypoint: bash
    args:
      - -c
      - |
        set -e
        pip install uv
        uv sync --frozen
        uv run pytest -q

  # -------------------------
  # Build Docker image
  # -------------------------
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - "-t"
      - "us-central1-docker.pkg.dev/$PROJECT_ID/swe-api/swe-api:$BUILD_ID"
      - "."

  # -------------------------
  # Push image
  # -------------------------
  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - "us-central1-docker.pkg.dev/$PROJECT_ID/swe-api/swe-api:$BUILD_ID"

  # -------------------------
  # Deploy to Cloud Run
  # -------------------------
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - swe-api
      - --image
      - "us-central1-docker.pkg.dev/$PROJECT_ID/swe-api/swe-api:$BUILD_ID"
      - --region
      - us-central1
      - --platform
      - managed
      - --allow-unauthenticated
      - --set-env-vars
      - MONGODB_URL=$_MONGODB_URL,MONGODB_DB_NAME=$_MONGODB_DB_NAME,API_V1_STR=/api/v1

images:
  - "us-central1-docker.pkg.dev/$PROJECT_ID/swe-api/swe-api:$BUILD_ID"

substitutions:
  _MONGODB_URL: "mongodb+srv://YOUR_ATLAS_URL"
  _MONGODB_DB_NAME: "users_db"